name: CI

# Run the checks on every push to main and on every pull request.
on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the checks only need to read the code.
permissions:
  contents: read

# A newer push to the same branch cancels the older, still-running check.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # this suite runs in seconds; bound any runaway/abusive job
    strategy:
      fail-fast: false  # if one Python version fails, still run the others
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml  # deterministic cache key

      - name: Install (package + dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q
